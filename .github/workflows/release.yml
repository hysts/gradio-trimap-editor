name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - run: uv build

      - run: gh release create ${{ github.ref_name }} dist/*.whl --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
